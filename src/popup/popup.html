<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 200px;
      padding: 12px;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #EFD2B0;
      background: #1A3263;
      margin: 0;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #FFC570;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      accent-color: #FFC570;
      width: 14px;
      height: 14px;
    }
  </style>
</head>
<body>
  <h3>Sleep Fade</h3>
  <label>
    <input type="checkbox" id="showBanner" checked>
    Show banner
  </label>
  <script src="./popup.js"></script>
</body>
</html>
